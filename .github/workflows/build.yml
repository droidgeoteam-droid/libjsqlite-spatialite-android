name: Zbuduj Android 16KB
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Znajdz foldery i zastosuj ostateczna naprawe naglowkow
        run: |
          MAIN_ANDROID_MK=$(find . -name "Android.mk" | awk '{ print length($0), $0 }' | sort -n | cut -d ' ' -f2- | head -n 1)
          
          JNI_DIR=$(dirname "$MAIN_ANDROID_MK")
          PROJECT_DIR=$(dirname "$JNI_DIR")
          
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
          # Konfiguracja 16KB i architektur
          echo "APP_LDFLAGS += -Wl,-z,max-page-size=16384" >> "$JNI_DIR/Application.mk"
          echo "APP_ABI := arm64-v8a armeabi-v7a x86_64 x86" >> "$JNI_DIR/Application.mk"
          echo "APP_PLATFORM := android-21" >> "$JNI_DIR/Application.mk"
          echo "APP_ALLOW_MISSING_DEPS := true" >> "$JNI_DIR/Application.mk"

          chmod -R 777 .

          # ----- CHIRURGICZNE CIĘCIE RASTERLITE2 -----
          sed -i '/librasterlite2/d' "$JNI_DIR/Android.mk"
          sed -i '/rasterlite2/d' "$JNI_DIR/Android.mk"
          sed -i '/freetype/d' "$JNI_DIR/Android.mk"
          sed -i '/tiff/d' "$JNI_DIR/Android.mk"
          sed -i '/gif/d' "$JNI_DIR/Android.mk"
          sed -i '/png/d' "$JNI_DIR/Android.mk"
          sed -i '/jpeg/d' "$JNI_DIR/Android.mk"
          sed -i '/webp/d' "$JNI_DIR/Android.mk"

          sed -i '/#include.*rasterlite2/d' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/void \*p_rl2_data = (void \*)rl2_alloc_private();/\/\//g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/rl2_init((sqlite3 \*)h->sqlite,p_rl2_data,0);/\/\//g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/rl2_init((sqlite3 \*)h->sqlite,0);/\/\//g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/(const char \*)rl2_version();/"wyciety_rasterlite";/g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          
          # Usuwamy RTTOPO
          sed -i 's/-DENABLE_RTTOPO=1//g' "$JNI_DIR/Android.mk"
          sed -i 's/-DENABLE_GCP=1//g' "$JNI_DIR/Android.mk"

          # ----- NALOT DYWANOWY W PYTHONIE -----
          python3 << 'EOF'
          import os, re
          for root, dirs, files in os.walk('.'):
              for file in files:
                  p = os.path.join(root, file)
                  
                  if file == 'alloc_cache.c':
                      with open(p, 'r') as f: txt = f.read()
                      if 'static char* dummy_ptr;' not in txt:
                          txt = 'static char* dummy_ptr = 0; static int dummy_int = 0;\n' + txt
                      txt = txt.replace('cache->gaia_geos_error_msg', 'dummy_ptr')
                      txt = txt.replace('cache->gaia_geos_warning_msg', 'dummy_ptr')
                      txt = txt.replace('cache->gaia_rttopo_error_msg', 'dummy_ptr')
                      txt = txt.replace('cache->gaia_rttopo_warning_msg', 'dummy_ptr')
                      txt = txt.replace('cache->silent_mode', 'dummy_int')
                      txt = txt.replace('free (dummy_ptr);', '')
                      txt = txt.replace('strcpy (dummy_ptr, msg);', '')
                      with open(p, 'w') as f: f.write(txt)
                      
                  if file == 'gg_rttopo.c':
                      with open(p, 'r') as f: txt = f.read()
                      if '#ifndef OMIT_RTTOPO' not in txt:
                          txt = '#include <config.h>\n#ifndef OMIT_RTTOPO\n' + txt + '\n#endif\n'
                      with open(p, 'w') as f: f.write(txt)
                      
                  if file == 'gg_transform.c':
                      with open(p, 'r') as f: txt = f.read()
                      txt = '#define PJ projPJ\n#define PJ_CONTEXT void\n#define PJ_FWD 1\n#define proj_trans_generic(a,b,c,d,e,f,g,h,i,j,k,l,m,n) 0\n' + txt
                      with open(p, 'w') as f: f.write(txt)
                  
                  if file == 'gg_xml.c':
                      with open(p, 'w') as f: f.write('int dummy_xml_file = 0;')
                  if file == 'virtualxpath.c':
                      with open(p, 'w') as f: f.write('int dummy_virtualxpath_file = 0;')
                  
                  if file == 'virtualtext.c':
                      with open(p, 'w') as f: f.write('int dummy_virtualtext_file = 0;')
                  
                  if '/topology/' in p and file.endswith('.c'):
                      with open(p, 'r') as f: txt = f.read()
                      if '#ifndef OMIT_RTTOPO' not in txt:
                          txt = '#include <config.h>\n#ifndef OMIT_RTTOPO\n' + txt + '\n#endif\n'
                      with open(p, 'w') as f: f.write(txt)

                  if file == 'xmlversion.h.in':
                      with open(p, 'r') as f: txt = f.read()
                      txt = re.sub(r'@[A-Z0-9_]*@', '0', txt)
                      target = os.path.join(root, 'xmlversion.h')
                      with open(target, 'w') as f: f.write(txt)

                  if file == 'version.c' and 'versioninfo' in root:
                      with open(p, 'r') as f: txt = f.read()
                      txt = txt.replace('VERSION', '"5.0.0"')
                      with open(p, 'w') as f: f.write(txt)

                  if file == 'json_config.h.win32':
                      with open(p, 'r') as f: txt = f.read()
                      txt = re.sub(r'#define HAVE_DECL_ISINF 1', '', txt)
                      txt = re.sub(r'#define HAVE_DECL_ISNAN 1', '', txt)
                      txt += '\n#define HAVE_STRDUP 1\n#define HAVE_SNPRINTF 1\n#define HAVE_VSNPRINTF 1\n#define HAVE_VASPRINTF 1\n#define HAVE_STRNCASECMP 1\n#define HAVE_STDARG_H 1\n#define HAVE_VA_COPY 1\n#define HAVE_VPRINTF 1\n'
                      target = os.path.join(root, 'json_config.h')
                      with open(target, 'w') as f: f.write(txt)
                      
                  if file == 'printbuf.c':
                      with open(p, 'r') as f: txt = f.read()
                      txt = txt.replace('# error Not enough var arg support!', '// zneutralizowane')
                      txt = txt.replace('#include "vasprintf_compat.h"', '// zneutralizowane vasprintf_compat')
                      txt = txt.replace('#include "snprintf_compat.h"', '// zneutralizowane snprintf_compat')
                      with open(p, 'w') as f: f.write(txt)
                      
                  if 'librttopo' in p and p.endswith('.c'):
                      with open(p, 'w') as f: f.write('int dummy_rttopo_file = 0;')

                  if file == 'sysdefs.h':
                      with open(p, 'r') as f: txt = f.read()
                      txt = txt.replace('typedef unsigned char _Bool;', '// typedef unsigned char _Bool;')
                      with open(p, 'w') as f: f.write(txt)

                  # CAŁKOWICIE USUŃ JAKIEKOLWIEK STARE LOCALCHARSET.H
                  if file == 'localcharset.h':
                      os.remove(p)
          EOF
          
          # ----- TWORZYMY BRAKUJĄCY CONFIG.H DLA SPATIALITE 5.0.0 -----
          SPATIALITE_5_DIR=$(find $(pwd) -type d -name 'libspatialite-5.0.0' | head -n 1)
          cat <<EOF > "$SPATIALITE_5_DIR/config.h"
          #ifndef CONFIG_H
          #define CONFIG_H
          #define OMIT_FREEXL 1
          #define OMIT_GEOCALLBACKS 1
          #define HAVE_FDATASYNC 1
          #define HAVE_INTTYPES_H 1
          #define HAVE_STDINT_H 1
          #define HAVE_UNISTD_H 1
          #define OMIT_RTTOPO 1
          #define OMIT_PROJ 1
          #define OMIT_LIBXML2 1
          #define OMIT_ICONV 0
          static void fnct_PROJ_GuessSridFromSHP() {} 
          #endif
          EOF
          
          touch "$SPATIALITE_5_DIR/librttopo.h"
          touch "$SPATIALITE_5_DIR/librttopo_geom.h"

          # ----- WSTRZYKNIĘCIE ZMIENNYCH DO STRUKTURY -----
          PRIV_HEADER=$(find "$SPATIALITE_5_DIR" -name "spatialite_private.h" | head -n 1)
          python3 -c "
          with open('$PRIV_HEADER', 'r') as f: content = f.read()
          content = content.replace('void *auth_context;', 'void *auth_context;\n    char* gaia_geos_error_msg;\n    char* gaia_geos_warning_msg;\n    char* gaia_rttopo_error_msg;\n    char* gaia_rttopo_warning_msg;\n    int silent_mode;')
          with open('$PRIV_HEADER', 'w') as f: f.write(content)
          "

          # ----- NAPRAWA BŁĘDU PROJ -----
          PROJ6_DIR=$(find $(pwd) -type d -name 'proj-6.1.1' | head -n 1)
          PROJ4_DIR=$(find $(pwd) -type d -name 'proj-4.9.1' | head -n 1)

          cp "$PROJ6_DIR/src/proj.h" "$PROJ6_DIR/include/proj.h" 2>/dev/null || true
          cp "$PROJ4_DIR/src/proj_api.h" "$PROJ6_DIR/include/proj_api.h" 2>/dev/null || true

          JSON_DIR=$(find $(pwd) -type d -name 'json-c-0.13.1' | head -n 1)
          echo "#include <stddef.h>" > "$JSON_DIR/config.h" 
          echo "#include <fcntl.h>" >> "$JSON_DIR/config.h"

          # ----- RĘCZNE I BEZPIECZNE ŁADOWANIE ŚCIEŻEK -----
          SQLITE_DIR=$(find $(pwd) -type d -name 'sqlite-amalgamation-3280000' | head -n 1)
          
          LIBXML_FILE=$(find $(pwd) -name 'parser.h' | grep '/libxml/' | head -n 1)
          LIBXML_INC=$(dirname $(dirname "$LIBXML_FILE"))
          
          GEOS_DIR=$(find $(pwd) -type d -name 'geos-3.7.2' | head -n 1)
          GEOS_INC="$GEOS_DIR/capi"
          GEOS_MAIN_INC="$GEOS_DIR/include"
          
          ICONV_DIR=$(find $(pwd) -type d -name 'libiconv-1.16' | head -n 1)
          ICONV_INC="$ICONV_DIR/include"
          ICONV_LIB="$ICONV_DIR/libcharset/include"
          
          echo "APP_CFLAGS += -include stddef.h -include stdarg.h -include fcntl.h -I$SQLITE_DIR -I$SPATIALITE_5_DIR/src/headers -I$SPATIALITE_5_DIR" >> "$JNI_DIR/Application.mk"
          echo "APP_CFLAGS += -I$LIBXML_INC -I$GEOS_INC -I$GEOS_MAIN_INC -I$PROJ6_DIR/include -I$PROJ6_DIR/src -I$ICONV_INC -I$ICONV_LIB -I$JSON_DIR" >> "$JNI_DIR/Application.mk"
          
          echo "APP_CXXFLAGS += -I$SQLITE_DIR -I$SPATIALITE_5_DIR/src/headers -I$SPATIALITE_5_DIR" >> "$JNI_DIR/Application.mk"
          echo "APP_CXXFLAGS += -I$LIBXML_INC -I$GEOS_INC -I$GEOS_MAIN_INC -I$PROJ6_DIR/include -I$PROJ6_DIR/src -I$ICONV_INC -I$ICONV_LIB -I$JSON_DIR" >> "$JNI_DIR/Application.mk"

          XZ_DIR=$(find $(pwd) -type d -name 'xz-5.2.4' | head -n 1)
          find "$XZ_DIR/src" -type d | while read -r d; do
              echo "APP_CFLAGS += -I$d" >> "$JNI_DIR/Application.mk"
              echo "APP_CXXFLAGS += -I$d" >> "$JNI_DIR/Application.mk"
          done

          echo "APP_CFLAGS += -Wno-implicit-function-declaration -Wno-int-conversion -Wno-incompatible-pointer-types -Wno-error -fpermissive" >> "$JNI_DIR/Application.mk"
          echo "APP_CXXFLAGS += -std=gnu++11 -Wno-error -fpermissive" >> "$JNI_DIR/Application.mk"

      - name: Przygotowanie Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Kompilacja biblioteki
        run: $ANDROID_NDK_HOME/ndk-build -C ${{ env.PROJECT_DIR }} APP_ALLOW_MISSING_DEPS=true

      - name: Zapisywanie gotowych plików
        uses: actions/upload-artifact@v4
        with:
          name: gotowe-biblioteki-16kb
          path: ${{ env.PROJECT_DIR }}/libs/
