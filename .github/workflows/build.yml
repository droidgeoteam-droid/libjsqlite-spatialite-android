name: Zbuduj Android 16KB (SpatiaLite)
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Przygotowanie i Naprawa Projektu
        run: |
          # 1. Znajdowanie ścieżek w sposób bardziej stabilny
          # Szukamy głównego folderu jni
          JNI_PATH=$(find . -type d -name "jni" | head -n 1)
          if [ -z "$JNI_PATH" ]; then
            echo "BŁĄD: Nie znaleziono katalogu jni!"
            exit 1
          fi
          
          # Konwertujemy na ścieżkę absolutną
          ABS_JNI=$(realpath "$JNI_PATH")
          ABS_PROJECT=$(dirname "$ABS_JNI")
          
          echo "PROJECT_DIR=$ABS_PROJECT" >> $GITHUB_ENV
          echo "JNI_DIR=$ABS_JNI" >> $GITHUB_ENV
          
          echo "Katalog JNI: $ABS_JNI"
          echo "Katalog Projektu: $ABS_PROJECT"

          # 2. Tworzenie Application.mk
          # Używamy bezpośredniej ścieżki
          cat <<EOF > "$ABS_JNI/Application.mk"
          APP_ABI := arm64-v8a x86_64 armeabi-v7a x86
          APP_PLATFORM := android-24
          APP_STL := c++_static
          APP_OPTIM := release
          APP_LDFLAGS += -Wl,-z,max-page-size=16384
          APP_CFLAGS += -Wno-error=format-security -Wno-implicit-function-declaration
          APP_ALLOW_MISSING_DEPS := true
          EOF

          # 3. Czyszczenie Android.mk z nieobecnych modułów (RasterLite2 itp.)
          # Szukamy wszystkich Android.mk i usuwamy zbędne zależności
          find "$ABS_JNI" -name "Android.mk" -exec sed -i 's/\brasterlite2\b//g' {} +
          find "$ABS_JNI" -name "Android.mk" -exec sed -i 's/\blibrasterlite2\b//g' {} +
          find "$ABS_JNI" -name "Android.mk" -exec sed -i 's/\bfreetype\b//g' {} +
          find "$ABS_JNI" -name "Android.mk" -exec sed -i 's/\bpng\b//g' {} +
          find "$ABS_JNI" -name "Android.mk" -exec sed -i 's/\bjpeg\b//g' {} +
          
          # Usuwamy linie import-module dla xz i rasterlite2
          sed -i '/import-module.*xz/d' "$ABS_JNI/Android.mk" || true
          sed -i '/import-module.*rasterlite2/d' "$ABS_JNI/Android.mk" || true

          # 4. Naprawa GEOS (duplikacja plików w pliku .mk)
          GEOS_MK=$(find "$ABS_JNI" -name "Android.mk" | grep "geos" | head -n 1)
          if [ -f "$GEOS_MK" ]; then
            sed -i 's/src\/inlines.cpp//2' "$GEOS_MK"
          fi

          # 5. Patchowanie kodu (Python)
          python3 << 'EOF'
          import os, re
          
          # Przeszukujemy pliki w poszukiwaniu tych do naprawy
          for root, dirs, files in os.walk('.'):
              for file in files:
                  p = os.path.join(root, file)
                  
                  if file == 'sqlite_jni.c':
                      with open(p, 'r') as f: txt = f.read()
                      txt = re.sub(r'#include.*rasterlite2.*', '/* removed */', txt)
                      txt = txt.replace('rl2_init', '// rl2_init')
                      txt = txt.replace('rl2_alloc_private', 'NULL //')
                      txt = txt.replace('rl2_version()', '"not_available"')
                      with open(p, 'w') as f: f.write(txt)

                  if file == 'spatialite_private.h':
                      with open(p, 'r') as f: txt = f.read()
                      if 'char* gaia_geos_error_msg;' not in txt:
                          txt = txt.replace('void *auth_context;', 'void *auth_context;\n    char* gaia_geos_error_msg;\n    char* gaia_geos_warning_msg;\n    char* gaia_rttopo_error_msg;\n    char* gaia_rttopo_warning_msg;\n    int silent_mode;')
                      with open(p, 'w') as f: f.write(txt)
          EOF

          # 6. Konfiguracja SpatiaLite (config.h)
          SL_DIR=$(find "$ABS_JNI" -type d -name "libspatialite-*" | head -n 1)
          if [ -d "$SL_DIR" ]; then
            cat <<EOF > "$SL_DIR/config.h"
          #ifndef CONFIG_H
          #define CONFIG_H
          #define OMIT_FREEXL 1
          #define OMIT_GEOCALLBACKS 1
          #define HAVE_FDATASYNC 1
          #define HAVE_INTTYPES_H 1
          #define HAVE_STDINT_H 1
          #define HAVE_UNISTD_H 1
          #define OMIT_RTTOPO 1
          #define OMIT_PROJ 1
          #define OMIT_LIBXML2 0
          #define OMIT_ICONV 0
          #define OMIT_LZMA 1
          #define HAVE_STRCASESTR 1
          #define HAVE_STRDUP 1
          #endif
          EOF
          fi

          # 7. Wstrzykiwanie Include'ów do Application.mk
          # Szukamy folderów, aby podać poprawne ścieżki kompilatorowi
          SQLITE_DIR=$(find "$ABS_JNI" -type d -name "sqlite-amalgamation-*" | head -n 1)
          JSON_DIR=$(find "$ABS_JNI" -type d -name "json-c-*" | head -n 1)
          
          {
            [ -n "$SQLITE_DIR" ] && echo "APP_CFLAGS += -I$SQLITE_DIR"
            [ -n "$SL_DIR" ] && echo "APP_CFLAGS += -I$SL_DIR/src/headers -I$SL_DIR"
            [ -n "$JSON_DIR" ] && echo "APP_CFLAGS += -I$JSON_DIR"
          } >> "$ABS_JNI/Application.mk"

      - name: Instalacja Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Kompilacja Bibliotek (.so)
        run: |
          # Budujemy w katalogu projektu
          $ANDROID_NDK_HOME/ndk-build -C ${{ env.PROJECT_DIR }} V=1

      - name: Zapisywanie gotowych plików
        uses: actions/upload-artifact@v4
        with:
          name: jsqlite-spatialite-16kb
          path: ${{ env.PROJECT_DIR }}/libs/
