name: Zbuduj Android 16KB
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Pobieranie zaleznosci (PROJ, GEOS, SQLite)
        run: make

      - name: Dodawanie flagi 16 KB do pliku konfiguracyjnego
        run: echo "APP_LDFLAGS += -Wl,-z,max-page-size=16384" >> jni/Application.mk

      - name: Przygotowanie Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Kompilacja biblioteki
        run: $ANDROID_NDK_HOME/ndk-build APP_PLATFORM=android-21

      - name: Zapisywanie gotowych plików
        uses: actions/upload-artifact@v4
        with:
          name: gotowe-biblioteki-16kb
          path: libs/
