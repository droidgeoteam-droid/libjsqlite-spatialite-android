name: Zbuduj Android 16KB (SpatiaLite)
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Przygotowanie i Naprawa Projektu
        run: |
          # 1. Znajdowanie ścieżek
          MAIN_ANDROID_MK=$(find . -name "Android.mk" | awk '{ print length($0), $0 }' | sort -n | cut -d ' ' -f2- | head -n 1)
          JNI_DIR=$(dirname "$MAIN_ANDROID_MK")
          PROJECT_DIR=$(dirname "$JNI_DIR")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
          echo "Katalog JNI: $JNI_DIR"
          echo "Katalog Projektu: $PROJECT_DIR"

          # 2. Globalna konfiguracja NDK (Application.mk)
          # Wymuszamy 16KB page size i czystą konfigurację architektur
          cat <<EOF > "$JNI_DIR/Application.mk"
          APP_ABI := arm64-v8a x86_64 armeabi-v7a x86
          APP_PLATFORM := android-24
          APP_STL := c++_static
          APP_OPTIM := release
          # Kluczowa flaga dla Android 15 (16KB Page Size)
          APP_LDFLAGS += -Wl,-z,max-page-size=16384
          APP_CFLAGS += -Wno-error=format-security -Wno-implicit-function-declaration
          APP_ALLOW_MISSING_DEPS := true
          EOF

          # 3. Usuwanie zależności od RasterLite2 i innych zbędnych modułów z Android.mk
          # NDK-build wywala się, gdy moduł widnieje na liście LOCAL_STATIC_LIBRARIES, a nie istnieje.
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\brasterlite2\b//g' {} +
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\blibrasterlite2\b//g' {} +
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\bfreetype\b//g' {} +
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\bpng\b//g' {} +
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\bjpeg\b//g' {} +
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\btiff\b//g' {} +
          find "$JNI_DIR" -name "Android.mk" -exec sed -i 's/\bwebp\b//g' {} +
          
          # Usuwamy fizycznie importy modułów których nie chcemy kompilować
          sed -i '/import-module.*xz/d' "$JNI_DIR/Android.mk"
          sed -i '/import-module.*rasterlite2/d' "$JNI_DIR/Android.mk"

          # 4. Naprawa błędu duplikacji GEOS (overriding recipe for target inlines.o)
          # W niektórych wersjach libjsqlite, plik inlines.cpp jest dodawany dwa razy.
          GEOS_MK=$(find "$JNI_DIR" -name "Android.mk" | grep "geos")
          if [ -f "$GEOS_MK" ]; then
            sed -i 's/src\/inlines.cpp//2' "$GEOS_MK"
          fi

          # 5. Patchowanie kodu (Python) - Rozwiązuje błędy struktur i brakujących funkcji
          python3 << 'EOF'
          import os, re
          
          for root, dirs, files in os.walk('.'):
              for file in files:
                  p = os.path.join(root, file)
                  
                  # Fix javasqlite: usuwamy wywołania rasterlite2 w C
                  if file == 'sqlite_jni.c':
                      with open(p, 'r') as f: txt = f.read()
                      txt = re.sub(r'#include.*rasterlite2.*', '/* removed */', txt)
                      txt = txt.replace('rl2_init', '// rl2_init')
                      txt = txt.replace('rl2_alloc_private', 'NULL //')
                      txt = txt.replace('rl2_version()', '"not_available"')
                      with open(p, 'w') as f: f.write(txt)

                  # Fix spatialite: dodajemy brakujące pola do struktury gaia_context (naprawa alloc_cache.c)
                  if file == 'spatialite_private.h':
                      with open(p, 'r') as f: txt = f.read()
                      if 'char* gaia_geos_error_msg;' not in txt:
                          txt = txt.replace('void *auth_context;', 'void *auth_context;\n    char* gaia_geos_error_msg;\n    char* gaia_geos_warning_msg;\n    char* gaia_rttopo_error_msg;\n    char* gaia_rttopo_warning_msg;\n    int silent_mode;')
                      with open(p, 'w') as f: f.write(txt)
                  
                  # Fix json-c: zapobieganie redefinicji INFINITY/NAN
                  if file == 'math_compat.h' and 'json-c' in p:
                      with open(p, 'r') as f: txt = f.read()
                      txt = txt.replace('#define INFINITY', '#ifndef INFINITY\n#define INFINITY')
                      txt = txt.replace('#define NAN', '#ifndef NAN\n#define NAN')
                      txt = txt.replace('DBL_MAX + DBL_MAX)', 'DBL_MAX + DBL_MAX)\n#endif')
                      with open(p, 'w') as f: f.write(txt)
          EOF

          # 6. Generowanie poprawnego config.h dla SpatiaLite 5.0.0
          # UWAGA: Nie tworzymy localcharset.h, bo libiconv ma swój i to powoduje błąd redefinicji.
          SPATIALITE_5_DIR=$(find $(pwd) -type d -name 'libspatialite-5.0.0' | head -n 1)
          if [ -d "$SPATIALITE_5_DIR" ]; then
            cat <<EOF > "$SPATIALITE_5_DIR/config.h"
          #ifndef CONFIG_H
          #define CONFIG_H
          #define OMIT_FREEXL 1
          #define OMIT_GEOCALLBACKS 1
          #define HAVE_FDATASYNC 1
          #define HAVE_INTTYPES_H 1
          #define HAVE_STDINT_H 1
          #define HAVE_UNISTD_H 1
          #define OMIT_RTTOPO 1
          #define OMIT_PROJ 1
          #define OMIT_LIBXML2 0
          #define OMIT_ICONV 0
          #define OMIT_LZMA 1
          #define HAVE_STRCASESTR 1
          #define HAVE_STRDUP 1
          #endif
          EOF
          fi

          # 7. Ręczne wstrzyknięcie ścieżek Include do Application.mk dla pewności kompilacji
          SQLITE_DIR=$(find $(pwd) -type d -name 'sqlite-amalgamation-3280000' | head -n 1)
          GEOS_DIR=$(find $(pwd) -type d -name 'geos-3.7.2' | head -n 1)
          ICONV_DIR=$(find $(pwd) -type d -name 'libiconv-1.16' | head -n 1)
          JSON_DIR=$(find $(pwd) -type d -name 'json-c-0.13.1' | head -n 1)

          {
            echo "APP_CFLAGS += -I$SQLITE_DIR"
            echo "APP_CFLAGS += -I$SPATIALITE_5_DIR/src/headers"
            echo "APP_CFLAGS += -I$GEOS_DIR/include -I$GEOS_DIR/capi"
            echo "APP_CFLAGS += -I$ICONV_DIR/include -I$ICONV_DIR/libcharset/include"
            echo "APP_CFLAGS += -I$JSON_DIR"
          } >> "$JNI_DIR/Application.mk"

      - name: Instalacja Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Kompilacja Bibliotek (.so)
        run: |
          cd ${{ env.PROJECT_DIR }}
          $ANDROID_NDK_HOME/ndk-build -C . V=1 APP_ALLOW_MISSING_DEPS=true

      - name: Sprawdzenie wyrównania 16KB (Page Alignment)
        run: |
          # Prosta weryfikacja czy biblioteki są poprawnie zbudowane pod 16KB
          LIB_FILE=$(find ${{ env.PROJECT_DIR }}/libs/arm64-v8a -name "*.so" | head -n 1)
          if [ -f "$LIB_FILE" ]; then
            echo "Weryfikacja ELF dla $LIB_FILE"
            readelf -l $LIB_FILE | grep -i "virtaddr" -A 1
          fi

      - name: Zapisywanie gotowych plików
        uses: actions/upload-artifact@v4
        with:
          name: jsqlite-spatialite-16kb-android
          path: ${{ env.PROJECT_DIR }}/libs/
