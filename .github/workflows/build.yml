name: Zbuduj Android 16KB
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Znajdz foldery i zastosuj ostateczna naprawe naglowkow
        run: |
          # Szukamy gﺧﺣﺏwnego pliku Android.mk w projekcie
          MAIN_ANDROID_MK=$(find . -name "Android.mk" | awk '{ print length($0), $0 }' | sort -n | cut -d ' ' -f2- | head -n 1)
          
          JNI_DIR=$(dirname "$MAIN_ANDROID_MK")
          PROJECT_DIR=$(dirname "$JNI_DIR")
          
          echo "Znaleziono folder JNI w: $JNI_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          
          # Konfiguracja 16KB i architektur
          echo "APP_LDFLAGS += -Wl,-z,max-page-size=16384" >> "$JNI_DIR/Application.mk"
          echo "APP_ABI := arm64-v8a armeabi-v7a x86_64 x86" >> "$JNI_DIR/Application.mk"
          echo "APP_PLATFORM := android-21" >> "$JNI_DIR/Application.mk"
          echo "APP_ALLOW_MISSING_DEPS := true" >> "$JNI_DIR/Application.mk"

          # -------------------- CHIRURGICZNE CIﺥCIE RASTERLITE2 I INNYCH BRAKﺣW --------------------
          sed -i '/librasterlite2/d' "$JNI_DIR/Android.mk"
          sed -i '/rasterlite2/d' "$JNI_DIR/Android.mk"
          sed -i '/freetype/d' "$JNI_DIR/Android.mk"
          sed -i '/tiff/d' "$JNI_DIR/Android.mk"
          sed -i '/gif/d' "$JNI_DIR/Android.mk"
          sed -i '/png/d' "$JNI_DIR/Android.mk"
          sed -i '/jpeg/d' "$JNI_DIR/Android.mk"
          sed -i '/webp/d' "$JNI_DIR/Android.mk"

          sed -i '/#include.*rasterlite2/d' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/void \*p_rl2_data = (void \*)rl2_alloc_private();/\/\//g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/rl2_init((sqlite3 \*)h->sqlite,p_rl2_data,0);/\/\//g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/rl2_init((sqlite3 \*)h->sqlite,0);/\/\//g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          sed -i 's/(const char \*)rl2_version();/"wyciety_rasterlite";/g' "$JNI_DIR/javasqlite-20120209/native/sqlite_jni.c"
          
          # Usuwamy RTTOPO z konfiguracji Android.mk
          sed -i 's/-DENABLE_RTTOPO=1//g' "$JNI_DIR/Android.mk"
          sed -i 's/-DENABLE_GCP=1//g' "$JNI_DIR/Android.mk"
          
          # ----- TWORZYMY BRAKUJﺥCY PLIK CONFIG.H DLA SPATIALITE -----
          SPATIALITE_DIR=$(find $(pwd) -name 'libspatialite*' -type d | head -n 1)
          cat <<EOF > "$SPATIALITE_DIR/config.h"
          #ifndef CONFIG_H
          #define CONFIG_H
          #define OMIT_FREEXL 1
          #define OMIT_GEOCALLBACKS 1
          #define HAVE_FDATASYNC 1
          #define HAVE_INTTYPES_H 1
          #define HAVE_STDINT_H 1
          #define HAVE_UNISTD_H 1
          #define OMIT_RTTOPO 1
          #endif
          EOF
          
          touch "$SPATIALITE_DIR/librttopo.h"
          
          # ----- BRUTALNA NEUTRALIZACJA ZEPSUTEGO LOGOWANIA W ALLOC_CACHE.C -----
          # Zamiast siﺥ bawiﺥ w `sed`, po prostu przekierujemy preprocesorem kod struktury.
          # Wstawiamy w locie makro do CFLAGS, ktﺣﺏre "zaczaruje" kompilator, mﺣﺏwiﺥc mu:
          # Kiedy w kodzie widzisz uﺧﺙycie "cache->gaia_geos_error_msg", uznaj to za odwoﺧanie
          # do sztucznej globalnej zmiennej, zamiast narzekaﺥ na brakujﺥcﺥ czﺥﺧﺥ struktury.
          
          echo "APP_CFLAGS += -Dgaia_geos_error_msg=magic_dummy_var -Dgaia_geos_warning_msg=magic_dummy_var -Dgaia_rttopo_error_msg=magic_dummy_var -Dgaia_rttopo_warning_msg=magic_dummy_var -Dsilent_mode=magic_dummy_int" >> "$JNI_DIR/Application.mk"
          
          # Definiujemy te sztuczne zmienne globalnie na samej gﺣﺏrze pliku alloc_cache.c:
          ALLOC_CACHE_FILE=$(find "$SPATIALITE_DIR" -name "alloc_cache.c" | head -n 1)
          sed -i '1i char* magic_dummy_var = 0; int magic_dummy_int = 0;' "$ALLOC_CACHE_FILE"

          # ----- NAPRAWA BﺧﺥDU LIBXML2 (Brakujﺥcy plik xmlversion.h) -----
          XMLVERSION_TEMPLATE=$(find $(pwd) -name 'xmlversion.h.in' | head -n 1)
          if [ -n "$XMLVERSION_TEMPLATE" ]; then
            TARGET_XMLVERSION="$(dirname "$XMLVERSION_TEMPLATE")/xmlversion.h"
            cp "$XMLVERSION_TEMPLATE" "$TARGET_XMLVERSION"
            sed -i 's/@[A-Z0-9_]*@/0/g' "$TARGET_XMLVERSION"
          fi

          # ----- OSTATECZNA BROﺧ (SNAJPER - ABSOLUTNE ﺧCIEﺧﭨKI) -----
          SQLITE_INC=$(dirname "$(find $(pwd) -name 'sqlite3.h' | head -n 1)")
          SPATIALITE_PRIV_INC=$(dirname "$(find $(pwd) -name 'spatialite_private.h' | head -n 1)")
          SPATIALITE_PUB_INC=$(dirname "$(find $(pwd) -name 'spatialite.h' | head -n 1)")
          
          LIBXML_FILE=$(find $(pwd) -name 'parser.h' | grep '/libxml/' | head -n 1)
          LIBXML_INC=$(dirname $(dirname "$LIBXML_FILE"))
          
          GEOS_INC=$(dirname "$(find $(pwd) -name 'geos_c.h' | head -n 1)")
          GEOS_MAIN_INC=$(dirname $(dirname $(find $(pwd) -name 'export.h' | grep '/geos/' | head -n 1)))
          
          PROJ_INC=$(dirname "$(find $(pwd) -name 'proj_api.h' | head -n 1)")
          echo "#include \"proj_api.h\"" > "$PROJ_INC/proj.h"
          
          ICONV_INC=$(dirname "$(find $(pwd) -name 'iconv.h' | head -n 1)")
          
          # ﺧadujemy wszystkie ﺧcieﺧﺙki
          echo "APP_CFLAGS += -I$SQLITE_INC -I$SPATIALITE_PRIV_INC -I$SPATIALITE_PUB_INC -I$SPATIALITE_DIR" >> "$JNI_DIR/Application.mk"
          echo "APP_CFLAGS += -I$LIBXML_INC -I$GEOS_INC -I$GEOS_MAIN_INC -I$PROJ_INC -I$ICONV_INC" >> "$JNI_DIR/Application.mk"
          
          echo "APP_CXXFLAGS += -I$SQLITE_INC -I$SPATIALITE_PRIV_INC -I$SPATIALITE_PUB_INC -I$SPATIALITE_DIR" >> "$JNI_DIR/Application.mk"
          echo "APP_CXXFLAGS += -I$LIBXML_INC -I$GEOS_INC -I$GEOS_MAIN_INC -I$PROJ_INC -I$ICONV_INC" >> "$JNI_DIR/Application.mk"

          # ----- WYﺧﺥCZENIE RESTRYKCJI NOWEGO KOMPILATORA -----
          echo "APP_CFLAGS += -Wno-implicit-function-declaration -Wno-int-conversion -Wno-incompatible-pointer-types -Wno-error -fpermissive" >> "$JNI_DIR/Application.mk"
          echo "APP_CXXFLAGS += -Wno-error -fpermissive" >> "$JNI_DIR/Application.mk"

      - name: Przygotowanie Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Kompilacja biblioteki
        run: $ANDROID_NDK_HOME/ndk-build -C ${{ env.PROJECT_DIR }} APP_ALLOW_MISSING_DEPS=true

      - name: Zapisywanie gotowych plikﺣﺏw
        uses: actions/upload-artifact@v4
        with:
          name: gotowe-biblioteki-16kb
          path: ${{ env.PROJECT_DIR }}/libs/
